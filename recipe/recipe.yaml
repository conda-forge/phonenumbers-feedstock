schema_version: 1

context:
  name: phonenumbers
  version: "9.0.31"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 287dbd012b12cf9bcc4803b55a29e0d204db5a0df747d38c9130fee1b1b6b0aa

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - phonenumbers
        - phonenumbers.carrierdata
        - phonenumbers.data
        - phonenumbers.geodata
        - phonenumbers.shortdata
        - phonenumbers.tzdata
      pip_check: true
      python_version: ${{ python_min }}

about:
  # license_file: No LICENSE in MANIFEST, local copy below
  license_file: LICENSE
  license: Apache-2.0
  summary: Python version of Google's common library for parsing, formatting, storing and validating international phone numbers.
  homepage: https://github.com/daviddrysdale/python-phonenumbers
  repository: https://github.com/daviddrysdale/python-phonenumbers

extra:
  recipe-maintainers:
    - jan-janssen
